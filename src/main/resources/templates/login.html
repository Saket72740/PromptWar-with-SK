<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Saket Kumar Kitchen</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #0f172a 50%, #172554 100%);
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --info: #0ea5e9;
            --primary: #6366f1;
            --danger: #ef4444;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-dark: #64748b;
            
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Glowing background accents */
        .ambient-glow-1 {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(80px);
        }
        .ambient-glow-2 {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.12) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(80px);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            z-index: 10;
        }

        /* Card styles */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 2.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        /* Branding */
        .brand-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-logo {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(14, 165, 233, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            color: var(--info);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        .brand-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .brand-title span {
            background: linear-gradient(135deg, var(--info) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Forms */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dark);
            transition: var(--transition);
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--info);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-control:focus ~ i {
            color: var(--info);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--info) 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(14, 165, 233, 0.4);
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(14, 165, 233, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Error alerts */
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            color: #fca5a5;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .error-box i {
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="login-container">
        <div class="glass-card">
            
            <div class="brand-section">
                <div class="brand-logo">
                    <i class="fa-solid fa-fire-burner"></i>
                </div>
                <h1 class="brand-title"><span>Saket Kumar</span> Kitchen</h1>
                <p class="brand-desc">Authentication required to access the planner</p>
            </div>

            <!-- Error Notification -->
            <div th:if="${param.error != null}" class="error-box">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Invalid credentials. Use <b>admin</b> / <b>admin</b></span>
            </div>

            <!-- Form -->
            <form th:action="@{/login}" method="POST" style="display: flex; flex-direction: column; gap: 1.25rem;">
                
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-icon-wrapper">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-icon-wrapper">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                        <i class="fa-solid fa-key"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i> Authenticate
                </button>
            </form>

        </div>
    </div>
</body>
</html>
